name: Save Weekly Deal Report

on:
  push:
    paths:
      - 'reports/**.md'
    branches:
      - main

jobs:
  save-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed report file
        id: report
        run: |
          FILE=$(git diff --name-only HEAD~1 HEAD -- 'reports/*.md' | head -1)
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "Found report: $FILE"

      - name: Insert into Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          FILE="${{ steps.report.outputs.file }}"
          if [ -z "$FILE" ]; then
            echo "No report file found, skipping."
            exit 0
          fi

          CONTENT=$(cat "$FILE")
          REPORT_DATE=$(basename "$FILE" .md)

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${SUPABASE_URL}/rest/v1/deal_reports" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "$(jq -n \
              --arg date "$REPORT_DATE" \
              --arg content "$CONTENT" \
              '{report_date: $date, content: $content}')")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Supabase response: $HTTP_CODE $BODY"

          # 200/201 = inserted, 204 = upserted existing row — all are success
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "Failed to save report (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Report saved to platform successfully (HTTP $HTTP_CODE)"

      - name: Fetch email recipients from Supabase
        id: recipients
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          FILE="${{ steps.report.outputs.file }}"
          if [ -z "$FILE" ]; then
            echo "json=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          RECIPIENTS=$(curl -s "${SUPABASE_URL}/rest/v1/deal_report_recipients?select=email,name" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")

          echo "Recipients found: $RECIPIENTS"
          # Compact to single line for GITHUB_OUTPUT
          COMPACT=$(echo "$RECIPIENTS" | jq -c '.')
          echo "json=$COMPACT" >> $GITHUB_OUTPUT

      - name: Send report email to recipients
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          FILE="${{ steps.report.outputs.file }}"
          if [ -z "$FILE" ]; then
            echo "No report file, skipping email."
            exit 0
          fi

          RECIPIENTS='${{ steps.recipients.outputs.json }}'
          COUNT=$(echo "$RECIPIENTS" | jq 'length')
          if [ "$COUNT" = "0" ]; then
            echo "No recipients configured, skipping email."
            exit 0
          fi
          echo "Sending to $COUNT recipient(s)"

          CONTENT=$(cat "$FILE")
          REPORT_DATE=$(basename "$FILE" .md)

          SEND_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${APP_URL}/api/send-deal-report" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg date "$REPORT_DATE" \
              --arg content "$CONTENT" \
              --argjson recipients "$RECIPIENTS" \
              '{report_date: $date, content: $content, recipients: $recipients}')")

          SEND_CODE=$(echo "$SEND_RESPONSE" | tail -1)
          SEND_BODY=$(echo "$SEND_RESPONSE" | head -1)
          echo "Send response: $SEND_CODE"
          echo "Send body: $SEND_BODY"

          if [ "$SEND_CODE" != "200" ]; then
            echo "ERROR: email send failed with status $SEND_CODE"
            exit 1
          fi

          echo "Email sent successfully: $SEND_BODY"
