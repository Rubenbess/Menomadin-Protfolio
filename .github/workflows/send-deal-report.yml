name: Save Weekly Deal Report

on:
  push:
    paths:
      - 'reports/**.md'
    branches:
      - main

jobs:
  save-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed report file
        id: report
        run: |
          FILE=$(git diff --name-only HEAD~1 HEAD -- 'reports/*.md' | head -1)
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "Found report: $FILE"

      - name: Insert into Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          FILE="${{ steps.report.outputs.file }}"
          if [ -z "$FILE" ]; then
            echo "No report file found, skipping."
            exit 0
          fi

          CONTENT=$(cat "$FILE")
          REPORT_DATE=$(basename "$FILE" .md)

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${SUPABASE_URL}/rest/v1/deal_reports" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "$(jq -n \
              --arg date "$REPORT_DATE" \
              --arg content "$CONTENT" \
              '{report_date: $date, content: $content}')")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Supabase response: $HTTP_CODE $BODY"

          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "Failed to save report"
            exit 1
          fi
          echo "Report saved to platform successfully"

      - name: Send report email to recipients
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          FILE="${{ steps.report.outputs.file }}"
          if [ -z "$FILE" ]; then
            echo "No report file, skipping email."
            exit 0
          fi

          CONTENT=$(cat "$FILE")
          REPORT_DATE=$(basename "$FILE" .md)

          SEND_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${APP_URL}/api/send-deal-report" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg date "$REPORT_DATE" \
              --arg content "$CONTENT" \
              '{report_date: $date, content: $content}')")

          SEND_CODE=$(echo "$SEND_RESPONSE" | tail -1)
          SEND_BODY=$(echo "$SEND_RESPONSE" | head -1)
          echo "Send response: $SEND_CODE $SEND_BODY"

          if [ "$SEND_CODE" != "200" ]; then
            echo "Warning: email send returned $SEND_CODE"
          fi
