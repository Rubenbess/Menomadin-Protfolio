name: Save Weekly Deal Report

on:
  push:
    paths:
      - 'reports/**.md'
    branches:
      - main
  workflow_dispatch:
    inputs:
      report_date:
        description: 'Report date (YYYY-MM-DD) — leave blank to use latest'
        required: false

jobs:
  save-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed report file
        id: report
        run: |
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            FILE="reports/${{ github.event.inputs.report_date }}.md"
          else
            FILE=$(git diff --name-only HEAD~1 HEAD -- 'reports/*.md' | head -1)
          fi
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "Found report: $FILE"

      - name: Insert into Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          FILE="${{ steps.report.outputs.file }}"
          if [ -z "$FILE" ]; then
            echo "No report file found, skipping."
            exit 0
          fi

          CONTENT=$(cat "$FILE")
          REPORT_DATE=$(basename "$FILE" .md)

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${SUPABASE_URL}/rest/v1/deal_reports?on_conflict=report_date" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "$(jq -n \
              --arg date "$REPORT_DATE" \
              --arg content "$CONTENT" \
              '{report_date: $date, content: $content}')")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Supabase response: $HTTP_CODE $BODY"

          # 200/201 = inserted, 204 = upserted existing row — all are success
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "Failed to save report (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Report saved to platform successfully (HTTP $HTTP_CODE)"

      - name: Fetch email recipients from Supabase
        id: recipients
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          FILE="${{ steps.report.outputs.file }}"
          if [ -z "$FILE" ]; then
            echo "json=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          RECIPIENTS=$(curl -s "${SUPABASE_URL}/rest/v1/deal_report_recipients?select=email,name" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")

          echo "Recipients found: $RECIPIENTS"
          # Compact to single line for GITHUB_OUTPUT
          COMPACT=$(echo "$RECIPIENTS" | jq -c '.')
          echo "json=$COMPACT" >> $GITHUB_OUTPUT

      - name: Send report email to recipients
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          FILE="${{ steps.report.outputs.file }}"
          if [ -z "$FILE" ]; then
            echo "No report file, skipping email."
            exit 0
          fi

          RECIPIENTS='${{ steps.recipients.outputs.json }}'
          COUNT=$(echo "$RECIPIENTS" | jq 'length')
          if [ "$COUNT" = "0" ]; then
            echo "No recipients configured, skipping email."
            exit 0
          fi
          echo "Sending to $COUNT recipient(s)"

          CONTENT=$(cat "$FILE")
          REPORT_DATE=$(basename "$FILE" .md)
          WEEK_OF=$(date -d "$REPORT_DATE" "+%B %-d, %Y" 2>/dev/null || date -j -f "%Y-%m-%d" "$REPORT_DATE" "+%B %-d, %Y" 2>/dev/null || echo "$REPORT_DATE")

          # Convert markdown to clean HTML using Python
          HTML=$(python3 - "$REPORT_DATE" "$WEEK_OF" <<'PYEOF'
import sys, re, html

report_date, week_of = sys.argv[1], sys.argv[2]
content = sys.stdin.read()

def esc(s): return html.escape(s)
def inline(s):
    s = esc(s)
    s = re.sub(r'\*\*(.+?)\*\*', r'<strong>\1</strong>', s)
    s = re.sub(r'\[(.+?)\]\(.+?\)', r'\1', s)
    return s

lines = content.split('\n')
body = ''
i = 0
while i < len(lines):
    line = lines[i]
    if line.startswith('|'):
        tbl, i2 = [], i
        while i2 < len(lines) and lines[i2].startswith('|'):
            tbl.append(lines[i2]); i2 += 1
        data = [r for r in tbl if not re.match(r'^\|[\s|:-]+\|$', r)]
        if len(data) >= 2:
            heads = [c.strip() for c in data[0].split('|') if c.strip()]
            rows  = [[c.strip() for c in r.split('|') if c.strip()] for r in data[1:]]
            body += '<table style="border-collapse:collapse;width:100%;font-size:12px;margin:12px 0">'
            body += '<thead><tr>' + ''.join(f'<th style="background:#4f46e5;color:#fff;padding:6px 10px;text-align:left">{esc(h)}</th>' for h in heads) + '</tr></thead>'
            body += '<tbody>' + ''.join('<tr style="background:' + ('#fff' if ri%2==0 else '#f8fafc') + '">' + ''.join(f'<td style="padding:6px 10px;border-bottom:1px solid #e5e7eb">{esc(c)}</td>' for c in row) + '</tr>' for ri,row in enumerate(rows)) + '</tbody>'
            body += '</table>'
        i = i2; continue
    if   line.startswith('# '):   body += f'<h1 style="font-size:20px;font-weight:700;color:#111827;margin:16px 0 4px">{inline(line[2:])}</h1>'
    elif line.startswith('## '):  body += f'<h2 style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#4f46e5;background:#eef2ff;padding:6px 10px;margin:24px 0 8px">{inline(line[3:])}</h2>'
    elif line.startswith('### '): body += f'<h3 style="font-size:14px;font-weight:700;color:#111827;margin:12px 0 4px">{inline(line[4:])}</h3>'
    elif re.match(r'^-{3,}$', line): body += '<hr style="border:none;border-top:1px solid #e5e7eb;margin:16px 0"/>'
    elif re.match(r'^[-*] ', line):  body += f'<p style="margin:4px 0;font-size:13px;color:#374151;padding-left:14px">• {inline(line[2:])}</p>'
    elif line.strip():            body += f'<p style="margin:4px 0;font-size:13px;color:#374151">{inline(line)}</p>'
    else:                         body += '<div style="height:6px"></div>'
    i += 1

print(f"""<!DOCTYPE html><html><head><meta charset="utf-8"></head>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;padding:0;background:#f1f5f9">
<div style="max-width:760px;margin:32px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)">
  <div style="background:#4f46e5;padding:28px 32px">
    <p style="margin:0 0 4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#c7d2fe">Deal Report</p>
    <h1 style="margin:0 0 4px;font-size:22px;font-weight:700;color:#fff">Israeli Tech Ecosystem</h1>
    <p style="margin:0;font-size:13px;color:#c7d2fe">Week of {week_of}</p>
  </div>
  <div style="padding:28px 32px">{body}</div>
  <div style="padding:16px 32px;background:#f8fafc;border-top:1px solid #e5e7eb;font-size:11px;color:#9ca3af">
    Menomadin Catalyst · Automated weekly report
  </div>
</div></body></html>""")
PYEOF
          )

          # Build to-array and payload
          TO_ARRAY=$(echo "$RECIPIENTS" | jq '[.[] | if .name and .name != "" then .name + " <" + .email + ">" else .email end]')
          SUBJECT="Menomadin Israeli Tech Deal Report — Week of ${WEEK_OF}"

          PAYLOAD=$(jq -n \
            --arg from "noreply@portfolio-menomadin.com" \
            --argjson to "$TO_ARRAY" \
            --arg subject "$SUBJECT" \
            --arg html "$HTML" \
            '{from: $from, to: $to, subject: $subject, html: $html}')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Resend response: $CODE"
          echo "Resend body: $BODY"

          if [ "$CODE" != "200" ]; then
            echo "ERROR: email send failed"
            exit 1
          fi
          echo "Email sent successfully"
