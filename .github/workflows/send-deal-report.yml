name: Save Weekly Deal Report

on:
  push:
    paths:
      - 'reports/**.md'
    branches:
      - main
  workflow_dispatch:
    inputs:
      report_date:
        description: 'Report date (YYYY-MM-DD) — leave blank to use latest'
        required: false

jobs:
  save-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed report file
        id: report
        run: |
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            FILE="reports/${{ github.event.inputs.report_date }}.md"
          else
            FILE=$(git diff --name-only HEAD~1 HEAD -- 'reports/*.md' | head -1)
          fi
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "Found report: $FILE"

      - name: Insert into Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          FILE="${{ steps.report.outputs.file }}"
          if [ -z "$FILE" ]; then
            echo "No report file found, skipping."
            exit 0
          fi

          CONTENT=$(cat "$FILE")
          REPORT_DATE=$(basename "$FILE" .md)

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${SUPABASE_URL}/rest/v1/deal_reports?on_conflict=report_date" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "$(jq -n \
              --arg date "$REPORT_DATE" \
              --arg content "$CONTENT" \
              '{report_date: $date, content: $content}')")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Supabase response: $HTTP_CODE $BODY"

          # 200/201 = inserted, 204 = upserted existing row — all are success
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "Failed to save report (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "Report saved to platform successfully (HTTP $HTTP_CODE)"

      - name: Fetch email recipients from Supabase
        id: recipients
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          FILE="${{ steps.report.outputs.file }}"
          if [ -z "$FILE" ]; then
            echo "json=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          RECIPIENTS=$(curl -s "${SUPABASE_URL}/rest/v1/deal_report_recipients?select=email,name" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")

          echo "Recipients found: $RECIPIENTS"
          # Compact to single line for GITHUB_OUTPUT
          COMPACT=$(echo "$RECIPIENTS" | jq -c '.')
          echo "json=$COMPACT" >> $GITHUB_OUTPUT

      - name: Send report email to recipients
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          FILE="${{ steps.report.outputs.file }}"
          if [ -z "$FILE" ]; then
            echo "No report file, skipping email."
            exit 0
          fi

          RECIPIENTS='${{ steps.recipients.outputs.json }}'
          COUNT=$(echo "$RECIPIENTS" | jq 'length')
          if [ "$COUNT" = "0" ]; then
            echo "No recipients configured, skipping email."
            exit 0
          fi
          echo "Sending to $COUNT recipient(s)"

          CONTENT=$(cat "$FILE")
          REPORT_DATE=$(basename "$FILE" .md)
          WEEK_OF=$(date -d "$REPORT_DATE" "+%B %-d, %Y" 2>/dev/null || date -j -f "%Y-%m-%d" "$REPORT_DATE" "+%B %-d, %Y" 2>/dev/null || echo "$REPORT_DATE")

          # Convert markdown to clean HTML using the checked-in script
          HTML=$(echo "$CONTENT" | python3 .github/scripts/md_to_html.py "$REPORT_DATE" "$WEEK_OF")

          # Build to-array and payload
          TO_ARRAY=$(echo "$RECIPIENTS" | jq '[.[] | if .name and .name != "" then .name + " <" + .email + ">" else .email end]')
          SUBJECT="Menomadin Israeli Tech Deal Report — Week of ${WEEK_OF}"

          PAYLOAD=$(jq -n \
            --arg from "noreply@portfolio-menomadin.com" \
            --argjson to "$TO_ARRAY" \
            --arg subject "$SUBJECT" \
            --arg html "$HTML" \
            '{from: $from, to: $to, subject: $subject, html: $html}')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Resend response: $CODE"
          echo "Resend body: $BODY"

          if [ "$CODE" != "200" ]; then
            echo "ERROR: email send failed"
            exit 1
          fi
          echo "Email sent successfully"
